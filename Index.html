<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBA Cloud Player</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121824;
      color: #ffffff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2, h3 {
      text-align: center;
    }
    .card {
      background-color: #1e2535;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-login { background-color: #f472b6; color: #fff; }
    .btn-register { background-color: #db2777; color: #fff; }
    .btn-logout { background-color: #ef4444; color: #fff; width: auto; padding: 5px 15px; }
    .btn-save { background-color: #22c55e; color: #fff; }
    .btn-load { background-color: #3b82f6; color: #fff; }
    .hidden { display: none !important; }
    #error-msg { color: #f87171; text-align: center; font-size: 14px; }
    
    /* Estilos del Emulador y Tienda */
    #emulator-wrapper {
      width: 100%;
      max-width: 600px;
    }
    #game {
      width: 100%;
      height: 400px;
      background: #000;
      margin-top: 10px;
      border-radius: 8px;
    }
    .store-container {
      background-color: #1e2535;
      padding: 15px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }
    .game-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2a3447;
      padding: 10px;
      margin-top: 8px;
      border-radius: 5px;
    }
    .game-item button {
      width: auto;
      padding: 5px 15px;
      background-color: #8b5cf6;
      color: white;
    }
  </style>
</head>
<body>

  <h2>🎮 GBA Cloud Player</h2>

  <!-- SECCIÓN DE AUTENTICACIÓN -->
  <div id="auth-section" class="card">
    <h3>Ingresar</h3>
    <p style="text-align:center; font-size:13px; color:#9ca3af;">Inicia sesión para guardar tus partidas</p>
    
    <input type="email" id="email-input" placeholder="Correo electrónico">
    <input type="password" id="password-input" placeholder="Contraseña">
    
    <button id="btn-login" class="btn-login">Iniciar Sesión</button>
    <button id="btn-register" class="btn-register">Crear Cuenta</button>
    
    <p id="auth-error"></p>
  </div>

  <!-- SECCIÓN PRINCIPAL (JUEGO Y NUBE) -->
  <div id="game-section" class="card hidden" style="max-width: 400px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span id="user-email-display" style="font-size: 13px; color: #cbd5e1;"></span>
      <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
    </div>
    <hr style="border-color: #2a3447; margin: 15px 0;">
    
    <h3>1. Carga tu juego local (.gba)</h3>
    <input type="file" id="rom-input" accept=".gba">
    
    <h3>2. Tus Partidas en la Nube</h3>
    <button id="btn-save-cloud" class="btn-save">💾 Guardar Partida</button>
    <button id="btn-load-cloud" class="btn-load">☁️ Cargar Partida</button>
  </div>

  <!-- TIENDA DE JUEGOS (GITHUB / JSDELIVR) -->
  <div id="store-section" class="store-container hidden">
    <h3>🛒 Tienda de Juegos (GitHub)</h3>
    <div style="font-size: 12px; color: #9ca3af; text-align: center; margin-bottom: 10px;">Juega directamente desde la nube sin descargar</div>
    
    <!-- Aquí puedes agregar tus juegos subidos a GitHub -->
    <div class="game-item">
      <span>Tekken Advance</span>
      <button class="btn-play-rom" data-rom-url="https://cdn.jsdelivr.net/gh/Lucas2026apks/Room-gba@main/Tekken%20Advance%20(Europe).gba">Jugar</button>
    </div>
    <!-- Puedes duplicar un bloque .game-item para cada juego nuevo que subas -->
  </div>

  <!-- CONTENEDOR DEL EMULADOR -->
  <div id="emulator-wrapper" class="hidden">
    <div id="game"></div>
  </div>

  <!-- LLAMADA AL SCRIPT PRINCIPAL -->
  <script type="module" src="./app.js"></script>
</body>
    </html>
